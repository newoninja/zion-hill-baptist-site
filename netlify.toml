[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/visit"
  to = "/visit.html"
  status = 200

[[redirects]]
  from = "/visit/"
  to = "/visit.html"
  status = 200

[[redirects]]
  from = "/history"
  to = "/history.html"
  status = 200

[[redirects]]
  from = "/history/"
  to = "/history.html"
  status = 200

[[redirects]]
  from = "/beliefs"
  to = "/beliefs.html"
  status = 200

[[redirects]]
  from = "/beliefs/"
  to = "/beliefs.html"
  status = 200

[[redirects]]
  from = "/sermons"
  to = "/sermons.html"
  status = 200

[[redirects]]
  from = "/sermons/"
  to = "/sermons.html"
  status = 200

[[redirects]]
  from = "/leadership"
  to = "/leadership.html"
  status = 200

[[redirects]]
  from = "/leadership/"
  to = "/leadership.html"
  status = 200

[[redirects]]
  from = "/give"
  to = "/give.html"
  status = 200

[[redirects]]
  from = "/give/"
  to = "/give.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
